<!DOCTYPE html>
<html>
<head>
  <title>ATM Simulator</title>
</head>

<body>

<h2>ATM SYSTEM</h2>

Account: <input id="account"><br><br>
PIN: <input id="pin" type="password"><br><br>
Amount: <input id="amount" type="number"><br><br>

<button onclick="generateFile()">Send to ATM</button>

<script>
function generateFile() {

  let acc = document.getElementById("account").value;
  let pin = document.getElementById("pin").value;
  let amt = document.getElementById("amount").value;

  let data =
`LOGIN ${acc} ${pin}
AMOUNT ${amt}`;

  let blob = new Blob([data], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "request.txt";
  a.click();

  alert("request.txt downloaded. Put it in C++ folder and run program.");
}
</script>

</body>
</html>
